version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: taller_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: taller_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taller_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  liquibase:
    build:
      context: .
      dockerfile: Docker/liquibase/Dockerfile
    container_name: taller_liquibase
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src/main/resources/db/changelog:/liquibase/changelog
      - ./liquibase.properties:/liquibase/liquibase.properties
    environment:
      LIQUIBASE_COMMAND_URL: jdbc:postgresql://postgres:5432/taller_db
      LIQUIBASE_COMMAND_USERNAME: postgres
      LIQUIBASE_COMMAND_PASSWORD: postgres
      LIQUIBASE_COMMAND_CHANGELOG_FILE: master.xml
    command: update

volumes:
  postgres_data:
